services:
  spotiflac-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotiflac-web
    ports:
      - "${SPOTIFLAC_PORT:-8080}:8080"
    environment:
      PORT: 8080
      SPOTIFLAC_APP_DIR: /app/data
      SPOTIFLAC_MUSIC_DIR: /music
    volumes:
      - ${SPOTIFLAC_DATA_PATH:-./data}:/app/data
      - ${SPOTIFLAC_MUSIC_PATH:-./music}:/music
    restart: unless-stopped
